            <div id="content">

                    <h2>Modificar Libro</h2>

                    <form class="formulario mx-auto" id="modificarCarr" name="modificarCarr" autocomplete="off">
                        <input type="hidden" id="id" name="id" />                        
                        <div class="row justify-content-center">
                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">
                                    <label for="titulo">Título</label>
                                    <input type="text" id="titulo" name="titulo" required minlength="3" maxlength="200" multipleSpaces="true"/>
                                </div>
                            </div>
                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">
                                    <label for="fecha_edi">Fecha Edición</label>
                                    <input type="text" id="fecha_edi" name="fecha_edi" required minlength="4" maxlength="30" multipleSpaces="true"/>
                                </div>
                            </div>
                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                        
                                    <label for="autores">Autores</label>
                                    <input type="text" id="autores" name="autores" required minlength="5" maxlength="200" multipleSpaces="true" letrasYCaracteres="true"/>
                                </div>
                            </div>
                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                        
                                    <label for="res_cus">Responsable de custodia</label>
                                    <input type="text" id="res_cus" name="res_cus" required minlength="10" maxlength="200" multipleSpaces="true" letrasYCaracteres="true"/>
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">
                                    <label for="dep_res">Departamento del responsable</label>
                                    <input type="text" id="dep_res" name="dep_res" required minlength="5" maxlength="100" multipleSpaces="true" letters="true"/>  
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                                
                                    <label for="tipo">Tipo</label>
                                    <input type="text" id="tipo" name="tipo" required minlength="5" maxlength="50" multipleSpaces="true" letters="true"/>
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                                
                                    <label for="editora">Editora</label>
                                    <input type="text" id="editora" name="editora" required minlength="5" maxlength="50" multipleSpaces="true" letrasYCaracteres="true"/>
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                                
                                    <label for="isbn">ISBN</label>
                                    <input type="text" id="ISBN" name="ISBN" required minlength="1" maxlength="20"  noSpaces="true" numeros="true"/>
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                                
                                    <label for="area">Área</label>
                                    <input type="text" id="area" name="area" required minlength="5" maxlength="50" multipleSpaces="true" letters="true"/>
                                </div>
                            </div>

                            <div class="col-12 col-sm-12 col-md-10 col-lg-12 col-xl-12">
                                <div class="mb-3">                                
                                    <label for="cantidad">Cantidad</label>
                                    <input type="text" id="cantidad" name="cantidad" required  minlength="1" maxlength="5" noSpaces="true" numero="true" integer="true"/>
                                </div>
                            </div>                            
                        </div>
                        
                        <div class="d-flex justify-content-center mt-4 gap-3">
                            <button class="botonAgregar mr-3" id="guardar" name="guardar" type="submit">Guardar</button>
                            <a href="Libros.html" class="botonAgregar">Regresar</a>
                        </div>
                    </form>
